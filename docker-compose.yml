services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mindmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindmap}
      POSTGRES_DB: ${POSTGRES_DB:-mindmap}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindmap}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-mindmap}:${POSTGRES_PASSWORD:-mindmap}@db:5432/${POSTGRES_DB:-mindmap}?sslmode=disable
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
