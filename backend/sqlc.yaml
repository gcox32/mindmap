version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries.sql"
    schema: "internal/db/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_interface: true
        overrides:
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
